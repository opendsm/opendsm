[tox]
envlist = 3.{10, 11, 12, 13, 14}

[testenv]
# editable install so tutorial data resolves to the in-repo data/ dir
# (load_test_data otherwise downloads from the repo over the network)
package = editable
deps =
    pytest
    pytest-cov
    pytest-xdist
    syrupy>=5,<6
setenv =
    OMP_NUM_THREADS = 1
    MKL_NUM_THREADS = 1
    OPENBLAS_NUM_THREADS = 1
    NUMEXPR_NUM_THREADS = 1
commands =
    pytest tests/
[tox]
envlist = 3.{10, 11, 12, 13, 14}

[testenv]
# editable install so tutorial data resolves to the in-repo data/ dir
# (load_test_data otherwise downloads from the repo over the network)
package = editable
deps =
    pytest
    pytest-cov
    pytest-xdist
    syrupy>=5,<6
setenv =
    OMP_NUM_THREADS = 1
    MKL_NUM_THREADS = 1
    OPENBLAS_NUM_THREADS = 1
    NUMEXPR_NUM_THREADS = 1
commands =
    pytest tests/

[testenv:coverage]
# Coverage with NUMBA_DISABLE_JIT=1 so JIT-compiled functions are visible to the
# tracer (they run as native code otherwise and report as uncovered). Runs
# serially: the debugger/tracer can't attach to xdist workers, and JIT-off is
# slower, so parallelism is dropped here.
setenv =
    {[testenv]setenv}
    NUMBA_DISABLE_JIT = 1
commands =
    pytest tests/ -p no:xdist --cov=opendsm --cov-report=term-missing --cov-report=xml
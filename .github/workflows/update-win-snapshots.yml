name: Update Windows snapshots

# Regenerates and commits the Windows-specific regression snapshots (the
# `[regression_win]` files pinned by the daily-model-derived tests, where
# DailyModel's nlopt SBPLX optimizer lands at a different local minimum on
# win32). Run on demand after intentionally changing daily-model behavior —
# never per-PR, so the committed snapshots stay a stable baseline the
# Windows matrix tests against rather than auto-blessing whatever Windows
# produces.
#
# The Windows job runs `pytest -m regression --snapshot-update` and uploads
# the regenerated snapshots; a follow-up Linux job copies them into the
# tests/ tree and commits the diff back to the dispatched branch.

on:
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: windows-latest
    env:
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      NUMEXPR_NUM_THREADS: 1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + test deps (mirrors tox.ini)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-xdist "syrupy>=5,<6"
      - name: Regenerate snapshots
        # --snapshot-update returns non-zero when snapshots change; we
        # want the resulting files regardless.
        continue-on-error: true
        run: pytest tests/ -m regression --snapshot-update
      - name: Upload Windows snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-regression-snapshots
          path: |
            tests/eemeter/daily_model/__snapshots__/**/*_win*.json
            tests/eemeter/hourly_caltrack/__snapshots__/test_derivatives/**/*_win*.json
          if-no-files-found: warn

  commit:
    needs: regenerate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download Windows snapshot artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-regression-snapshots
          path: artifact-staging
        continue-on-error: true
      - name: Move _win snapshots into the tests tree
        run: |
          set -e
          if [ ! -d artifact-staging ]; then
            echo "No artifact directory; nothing to commit."
            exit 0
          fi
          # Artifact preserves the relative path under tests/. Copy each
          # *_win.json into tests/<same relative path>.
          find artifact-staging -name "*_win.json" -print | while read -r src; do
            rel="${src#artifact-staging/}"
            mkdir -p "tests/$(dirname "$rel")"
            cp "$src" "tests/$rel"
          done
          rm -rf artifact-staging
      - name: Commit and push _win changes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only the _win.json files. Anything else is incidental.
          git add 'tests/**/*_win*.json' || true
          if git diff --cached --quiet; then
            echo "No _win snapshot changes to commit."
            exit 0
          fi
          git commit -s -m "ci: update Windows regression snapshots"
          git push

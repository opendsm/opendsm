name: Test

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  schedule:
    # run monthly to monitor dependency updates
    - cron: "0 0 1 * *"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
        # All default GitHub-hosted macOS runners are Apple Silicon (ARM);
        # Intel Mac coverage would require paid large-runner variants.
        os: [ubuntu-latest, windows-latest, macos-14, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }} on ${{ matrix.os }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install tox
        run: pip install tox
      - name: Run tox
        run: tox -e ${{ matrix.python }}